body:
  text: 隋北印度健陀羅國三藏闍那崛多譯爾時慧命阿難白佛言世尊惟願世尊或住一劫或減一劫憐愍此等諸衆生故所以者何如來多陀阿伽度阿羅訶三藐三佛陀若住世者如是大事常現於世又令是等真善大士數數往返閻浮提內我等衆生復應於此如許時間當見此等菩薩大衆承事供養又於此時如是經典復應當得廣行流布復如許時我等得聞合佛法義如許時間令我得見如來世尊及大士等種種現化神通之力若如來今日不住於世入涅槃者我等衆生於如來世尊滅度之後遠離三事何等為三所謂不見佛不聞正法三者不見此等大士弘廣之心亦復不得承奉供養有如是失慧命阿難説是言已悲號大哭憂歎懊惱涕淚滿目宛轉在地如斫樹倒並唱是言我等速疾共佛別離諸善知識亦復別離爾時衆中有菩薩摩訶薩名曰善思義以偈白慧命阿難言阿難莫憂惱諸行悉無常世法欲常者此處不可得若言有諸行此言不可得如是諸法空汝今何憂苦諸智皆悉空於佛智亦空佛尚不可得汝今何憂愁汝莫生分別智者捨分別諸有如虛空如陽焰似水亦如幻師化象馬諸乘等園林衆聚落樹木諸花果世諦亦如是如幻化無實諸佛及聲聞亦如是不異爾時慧命阿難以偈報善思義菩薩言如是如所説諸法無有相此最為勝法我今最後聞云何向舍衛所問我何報阿難佛何在世眼何時來我昔往彼處常見佛世尊今往彼處空大智我那住爾時寂靜轉善男子復向慧命阿難以偈白言汝於億年哭此事難可得阿難汝諦觀法界難見處譬如芭蕉莖葉葉皆除去其間無有實法體亦如是猶如天降雨普下諸水渧泡起已還滅諸有為亦然如水沫揣聚有眼者觀見此處無有實世相亦如是譬如鏡中像其體無有實三界世相爾智者莫涕泣爾時慧命阿難以偈報寂定菩薩摩訶薩言我非不知此如汝智者説三相皆無常經中大仙説但此億數天泣淚皆啼哭向我邊叫喚以是生我苦世尊不久去捨我等眼者我等何趣向誰能救護我正法從誰聞寂靜深無比我今供養誰嗚呼佛難見爾時無攀緣菩薩摩訶薩以偈告慧命阿難言尊者阿難起但觀法莫憂法無有來者亦無有去者譬如佛有生證菩提亦爾譬如轉法輪涅槃亦如是諸佛不曾生亦復不曾滅如是真法中阿難何以哭汝聞我毛孔出如是諸聲諸有空寂靜佛等四種事爾時慧命阿難以偈白無攀緣菩薩摩訶薩言大士等不久各各別剎去彼國見諸佛説於甘露法汝聞彼佛法甚深諸妙義見彼佛徒衆及諸菩薩等今我億數天哭泣而圍繞世尊涅槃已智者我那住優婆塞千數今日承聽我大苦惱憂悲我云何慰喻三十三焰摩兜率及他化自在及梵天如是等天來云何令歡喜釋牛王滅後云何宣彼法我口云何辨諸天問我時阿難尊何在彼問我何報人牛王滅後一切諸處所甚深如來住我於經行林今在何處所爾時開敷華神通德善男子以偈白慧命阿難言我以知汝行善於三月中數現身向汝阿難莫哭泣自餘千數佛我告為汝故諸佛為汝説化作釋種身諸佛有慈念以汝好事佛當來向汝邊阿難莫大哭天等諸世間今日可憂悲如是大教師隱寂而不現如來昔曾説壽命住億劫諸行念念滅我對教師聞爾時慧命阿難住於佛後三大叫喚而説偈言衆生所歸者能與彼等眼導師入滅後衆生轉盲冥勝王阿闍世聞此不善言導師入滅後憂苦云何住勝人今涅槃於後力士子如是等憂惱悲號大哭泣彼等集聚已最後見導師敬心而尊重合掌以曲躬天龍夜叉滿縱廣五由旬此處無空缺人類無入處雨微妙香華充滿至于膝復雨諸末香供養最勝仙難陀優波陀及六十億龍悉來涅槃處最後見導師摩那斯婆論娑伽羅大龍睺嘍目真陀各百億圍繞起雲雨香水散灑此大地降大雨而來最後見導師諸天雨天華及雨淨香水天龍等敬心供養世尊故阿耨達龍王六十俱胝等雨種種寶雨到人牛王邊伊羅鉢啼哭須彌子大蛇供養世尊故最後奉見佛諸龍有百千億數那由他起雲震雷電來到導師所彼等澍大雨清淨諸香水亦為供養故最後見世尊夜叉千億數或百那由他念佛諸功德皆來欲見佛復有四天王悲泣滿面淚來至導師邊最後覲見佛釋提摩那民諸天衆圍繞六十三千數已來到佛所彼等雨天花微妙曼陀羅及雨栴檀末供養最勝仙毗求螺髻梵二梵衆圍繞悲泣到佛所最後見如來淨居天威力多百億諸天號哭到佛所以佛今涅槃諸天百億數種種悲哀泣勸請大導師願住於一劫魔子大智慧名娑陀婆訶愴怏到佛所勝仙涅槃故捧執世尊足傴身勸請佛願愍世間故釋王住一劫世尊若住者為大仁諸天當不思議利請尊住一劫爾時無攀緣善男子以偈告彼一切諸天世人及諸梵天王商主魔王子等而説偈言汝等悉不知小兒如獼猴恆常心放逸以何號啼哭譬如豬睡眠忽起失本念被刀斫剝時驚怖馳奔走我意如是見汝等皆如是昔不聞法者以貪放逸故今日智慧炬將滅而不現及佛猶現在汝應作善業爾時世尊告慧命阿難及富婁那須菩提并不空見王童子迦葉上座大俱絺羅及諸上座今告汝等諸比丘言將汝右手來與我彼諸比丘聞佛世尊如是言已即白佛言善哉世尊爾時諸比丘等滿一千人各以右手奉授世尊爾時世尊復以左手執彼一切諸比丘右手執已復以右手執羅睺羅及阿難手付與諸比丘手中口遺囑曰汝等比丘我阿難賢及羅睺羅上座今付囑汝等遺囑汝等於如是時出大叫聲如是叫聲悲號啼哭震動天地甚大可畏而彼大聲遍此佛剎爾時羅睺羅阿難當付囑時衆中五百比丘見是事已便捨身命所以者何彼諸比丘不忍見佛入於滅度彼作是念寧使我等先入涅槃不忍見此世間大燈世間導師大慈悲父最善知識憐愍衆生常與世樂今入滅盡我豈忍見爾時於彼剎那羅婆浮休多時五百諸佛各住自剎皆伸右手與釋迦牟尼爾時世尊又以手執阿難羅睺羅上座手付囑與彼如來手中而説偈言此我羅睺子阿難我侍者今在諸佛前我付囑此二於今後夜分我當入涅槃更不復見我天龍及人等亦無有歸依救護憐愍者惟除諸世尊覆不思議慈我觀諸世間不思議無量不見一衆生今我為誰住無量千數劫猶如恆河沙我於如是劫為一衆生住我已利衆生有信敬心者自餘無信心億佛不能化爾時五百諸佛異口同聲而説偈言尊已衆生利尊作佛事已現種種神通擊大法鼓竟已充億衆生如雲雨潤地拔衆生毒箭釋種大仙人爾時長老阿難慧命羅睺羅兩膝著地以偈白彼諸佛曰大丈夫勸請令尊住一劫以佛威力故一切見眼者最勝二足尊大智住世故多有衆生信得利不思議增長諸天人阿修羅減少聲聞及菩薩多生不思議爾時彼五百諸佛告慧命阿難及羅睺羅言汝等善男子莫大啼哭莫大愁憂本性如是事盡如是真實如是諸行如是一切有為法一切作法一切世諦法悉皆如是盡際如是已捨身命如來行乃無量以世諦法如是故不得自在又如來者是法身非有為身無住世法汝等不應請如來住諸善男子汝等且止到我佛剎釋迦如來即時當伸右手當放光明彼之光明照我剎土照彼土已汝等還來見釋迦佛在汝等前為汝説法令汝等聞是故汝等莫大憂愁爾時世尊入於三昧住三昧已即伸右手於右手中乃至大拇指端及於左手諸身節分乃至千輻輪處足相之中及手足柔軟網縵相中赤銅色瓜甲及以十指妙色掌文寶手之間皆悉放於百千億光明一一光明化生蓮華百千億數一一華臺化出化師子高座百千億數一一座上見一佛坐一一化佛教化無量百千億衆生其間或得漏盡或得離欲地如是一切諸相好中所放光明事相皆亦如是如是等臍輪之間及陰馬藏相亦復如是面輪眉間亦復如是爾時世尊從於頂上放百千種光明一一光明端化出蓮華百千億數一一花臺化作師子臺座百千億數一一座上化一佛坐為説妙法彼諸如來不説餘法唯説菩薩密藏修多羅及諸陀羅尼金剛章句為人顯説清淨三輪如來諸力無畏法等似彼法門一一化佛一一説法能淨無量無邊衆生令住不退轉地向於阿耨多羅三藐三菩提爾時世尊於娑羅雙樹間右脅師子臥床中化現一佛右脅而臥化已自身即至活大地獄中到彼處已身放光明放光明已其光遍照活地獄中爾時世尊以此光明照於活大地獄已而説偈言此衆生數死數數還復活又不捨彼想故生諸苦惱世有此聖出世尊能作明能説諸正法滅除諸苦惱無為亦無盡無滅亦無行若能如是解彼不墮諸趣爾時如來説是偈已於彼剎那羅婆摩休多時令彼活大地獄三十億數諸苦衆生便得捨身即捨身已生於三十三天爾時世尊復至三十三天還説此偈以佛神力聲遍一切諸大地獄彼地獄趣無量百千億諸衆生捨地獄身生兜率陀天得生天已還復憶念前所説法皆得阿那含果爾時諸天子得法果已證法證果入於諸法共説偈言譬如大曠路有智慧商主度脫多衆生被賊諸獸者世尊亦如是無上大商主能脫億衆生縛在生死中我等歸依佛光明大商主於我起慈悲能脫諸苦惱我等歸依法我等身已證我等歸依僧功德難思議爾時世尊以涼冷光明普照阿鼻脂地獄處作涼冷已除滅熱惱一切苦毒成就諸法千數億分能令一切得諸喜樂愍哀潤益一切衆生安慰柔軟哀憐喜慶利益衆生合三空門無相無願及以無作告彼地獄諸衆生等而説偈言空法及無相無生及無滅若解如是法彼即脫惡道爾時八百千億衆生得聞偈已此偈所説三世無礙是諸法分成百千種已至耳邊清淨微妙聞是聲已從於阿鼻脂大地獄捨地獄身即生他化自在天宮爾時世尊住梵天宮復説此偈言衆生最上樂無有諸苦處名相所説處及諸顛倒想健兒應當捨即免諸苦惱諸想皆顛倒及著非色想三界何有樂數數流轉生死已復更生增長相續苦能以智知空亦不著於空彼人即知空不著知空者此知法義已亦復無有我既不得於我此處何有苦空是無為法相亦不可得能見無我智此是真佛子爾時彼百千億數諸衆生等所生之處即得無漏天仙妙果即便憶念宿命之時受地獄苦復念如來丈夫功德知報佛恩先取滅度又復不忍見於如來多陀阿伽度阿羅訶三藐三佛陀入於涅槃時諸天子已得果者異口同聲而説偈言我等不忍見大慈調御丈夫入滅度能為衆生作光明我不忍見先取滅作是語已即於此處入於涅槃爾時世尊於彼剎那牟休多時從梵天宮便自隱身即至娑羅雙樹之間爾時世尊作如是念曰我於今日後夜分時入於涅槃即是最後見於衆生我今當可令其歡喜滅一切苦而受快樂顯現如來大神通力令彼衆生即便得入安隱之門欲顯如來無餘涅槃合諸佛意故示神通爾時世尊作是念已欹右脅臥猶如師子心無所畏觀察十方一切大衆猶大龍象如是觀已即以右足第一拇指按此大地出大音聲六種震動遍十方界示現無礙不思議光照曜十方爾時世尊從身諸相復放光明放光明已一一毛孔復出微妙恆河沙數微妙光明一一光明遍照恆河沙等諸佛剎土彼之光明不相雜入無所妨礙如是數數從毛孔中次第放諸微妙光明如是毛孔各各次第復放光明還復如是遍照如前爾時世尊更復顯現作諸神通現神通已以佛神力佛護持力令諸衆生皆得具足所見境界佛眼無異彼諸衆生住此佛剎皆悉覩見如來光明所照一切諸佛剎土爾時世尊告諸比丘汝等見彼東方世界有城周圓縱廣一千由旬如是廣大上下亦爾以諸微塵百千億數滿此國城汝等見不諸比丘白佛言如是婆伽婆如是修伽陀我等皆見佛復告曰汝諸比丘於意云何此微塵數是為多不諸比丘言如是如是婆伽婆佛復告言諸比丘若有人能於諸法中知如是等無為之法不生不滅無漏無為如是知者彼諸衆生得脫諸苦一切惡道當於爾時有三十億諸衆生等聞此法已即得阿那含果既得果已異口同聲而説偈言無為法無盡無漏亦不滅聖法如是知我等證寂滅知以如是得如實知諸根為憐愍衆生示現因緣法如來化我等拔除毒箭病一切智與藥及與於涅槃智炬今速疾智眼不久滅億衆苦逼切從活地獄出拔箭大醫師治衆生病者能救無數衆令不墮惡道爾時世尊立住黑繩大地獄岸上放大光明遍照彼大地獄拔於彼處無量衆生置於天上如是等熱惱地獄大熱惱地獄亦皆如是叫喚大叫喚大地獄衆合大衆合地獄拔出無量無邊衆生安置善道及涅槃道爾時世尊復以金色光明照八大地獄其光明力能令衆生所觸身者皆得安樂遍體潤益身心歡喜苦惱消除眼目所觀心地歡慶快得清涼從慈悲生令身安隱光明遍照大地獄已滅諸熱惱和軟流潤彼大地獄所有衆生在大火聚熾然中者與彼樂故於諸毛孔次第而放如是光明爾時世尊以大光明普覆一切無量衆生令心柔軟堪任法器具足無量百千功德以微妙語而説偈言我與世間樂解脫諸憂苦見諸苦逼切示現涅槃道我所説諸法寂靜無畏樂若能知彼法此不墮惡趣能歸依佛者彼人得大利百千諸劫數更不見諸苦爾時如來説此偈已即於剎那羅婆牟休多時諸比丘衆及諸衆生多於前數復有無量無邊諸佛右脅而臥師子床上彼諸世尊從師子床起還復示現如是神通爾時彼四部衆白佛言世尊此諸佛等皆悉欲於剎那羅婆牟休多時入般涅槃現神通耶如今世尊所現無異佛告諸比丘如是如是彼諸佛等今日同欲捨最後身入於涅槃彼諸佛等悉皆同名釋迦牟尼皆於力士所生之地娑羅雙樹臥師子床今後夜分當入涅槃爾時世尊於南方及西南方西方及西北方北方及東北方東方及東南方上下二方遍告十方諸比丘言汝等比丘見於東方無量無邊諸佛世尊證得阿耨多羅三藐三菩提不諸比丘言如是如是婆伽婆我等皆見以世諦故見非第一義佛復告諸比丘譬如四天下世界微塵悉滿乃至從金剛際至梵天宮諸比丘於汝意云何頗有人知其數不能以譬喻知其數不諸比丘言不也世尊難可得知佛復告諸比丘譬如前所説微塵譬喻如是等四天下世界如是百千億世界皆悉充滿彼微塵衆諸比丘彼所有微塵如是等微塵我以肉眼見此世界諸佛世尊所住在東方如一步地但以肉眼無礙無分別見前世界如向所説如是南西北方四維上下亦復如是諸比丘譬如四大天下諸世界若百千億數滿彼微塵從金剛際至梵天宮所有微塵一一方面各有若干諸佛世尊一一方面我皆現見此諸世尊坐於道場或有已坐或始坐者彼等一切諸佛世尊皆悉同名釋迦牟尼如是復有無量諸佛與然燈佛同一名號我復見有諸佛世尊名勝一切亦同名號如是一切諸佛同名蓮華上如是等上佛同一名者如是上名稱佛同一名者如是拘樓孫佛同一名者如是拘那含佛同一名者如是迦葉佛同名號者如是各各佛同名號者我在於此皆悉現見彼諸佛等各各名號我於世間得最勝法微妙法無極之法但有能稱名者皆得善根彼等諸佛各各名號如是無邊如是等諸佛世尊我住於此皆悉現見如是等現在世間種種名字或入無餘涅槃或現住世轉於法輪我住於此悉皆現見彼佛世尊於我肉眼無礙無妨皆現在前諸比丘如來如是復勝此知更復勝知不可思議更復不可思議無量無邊復有無量無邊如是等無量知見諸比丘以是義故如來智見無邊如是無邊不可稱量如是不可稱如是不可思議但以肉眼況復盡於諸佛智法諸比丘譬如此剎所有一切衆生若在家若出家彼諸衆生假使悉成阿耨多羅三藐三菩提具足十力四無所畏彼諸世尊有一善男子能以四事供養承事足滿一劫尊重恭敬種種樂具諸莊嚴事無量無邊不可思議復有善男子善女人等能信我此顯示一切諸佛所説法門乃至一念頃能生實想不起疑心彼人即於發心之時所得功德近諸如來所有功德復勝三千大千世界所有衆生證得諸佛一切智已經劫供養得福雖多不如於此法門生一念信福多於彼若有菩薩信此智者彼之菩薩即得近諸世尊阿耨多羅三藐三菩提爾時世尊説此肉眼功德之時有六十二億諸衆生回向阿耨多羅三藐三菩提者還生退心所以者何佛阿耨多羅三藐三菩提難可證故我等但於此處滅盡諸苦取漏盡果復有無量無邊衆生住於學地復有十那由他菩薩成就最初發菩提心復有三十二億諸菩薩等得無生忍法爾時魔王波旬愴怏苦惱泣淚滿面白佛言世尊我為何事欲令多陀阿伽度阿羅訶三藐三佛陀早入涅槃乃令無量無邊衆生出我境界今者世尊東方黃晦日未現頃所作佛事如住一劫若住一劫未能過此利益度脫多數衆生所謂住於般涅槃道如來今者令我境界悉皆空虛時魔波旬説是言已佛告波旬汝莫啼哭波旬汝猶大有不作善業及不信者是汝朋友在汝境界汝是彼伴爾時世尊即以甲爪取地上塵告魔波旬於汝意云何為我爪上土塵多耶為此大地上塵多乎作是語已時魔波旬白佛言世尊指甲上土少不足言如是語已佛告波旬譬如甲上土塵甚少我所度衆生入涅槃者復少於此爪甲上土波旬譬如大地土塵甚多無量無邊在汝境界衆生亦復如是甚多無量波旬汝莫憂愁應生歡喜何以故衆生在汝境界多大地土故波旬然諸衆生自作不善去涅槃遠非汝所為所以者何但衆生界無有邊際波旬汝欲所作但當作之如來今日於後夜分當入涅槃爾時世尊告諸比丘汝諸比丘見此世界諸佛已不諸比丘白佛言世尊如是如是婆伽婆我等已見佛復告諸比丘此諸佛剎復多無量汝等當知見諸佛剎莊嚴已不復見諸菩薩莊嚴淨土已不復見諸聲聞莊嚴已不諸比丘白佛言世尊如是婆伽婆如是修伽陀佛復告諸比丘如來如是知見復倍上數知見無量更復無量皆悉了知諸比丘假使我於一劫所説如是佛剎莊嚴之事如我見於十方世界亦復如是假使於一百劫於一千劫億載數劫那由他劫更倍譬喻廣分別説猶不可盡然諸比丘導師所作者為諸聲聞所作已訖於於一切處我已説訖示現內外諸法真心示現皆已説竟諸佛於法無有吝惜無不辨者乃至一莖草等一毛髮許汝等比丘從今已去應須如法勤而修行我已為汝示現涅槃我已為汝説涅槃道已成就衆生善根我所證得阿耨多羅三藐三菩提乃於往昔行大苦行及於難行汝等今者於彼大法具足受持勿令隱沒汝等應作如是修行爾時世尊現大神通十方諸佛所有説法及説法處此剎衆生皆得聞知彼諸如來所有教敕所有衆生承奉教敕皆已證知復有恆河沙數衆生住於三種智復有十億百千諸衆生等發菩提心住於阿耨多羅三藐三菩提復有十百千億那由他諸衆生等住於辟支佛地自餘諸衆生等得漏盡證如是次第無量無邊阿僧祇不可數不可量不可思那由他諸衆生聞此法已得大饒益爾時世尊告諸比丘汝等比丘當知我今不久涅槃汝等應當護持如來教法為自利為他利故汝等諸比丘應當如是修學佛説經已慧命阿難及天人龍阿修羅揵闥婆等一切世間聞佛所説頂戴奉行
